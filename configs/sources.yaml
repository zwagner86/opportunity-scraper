enabled_sources:
  - html_generic
  - stack_exchange

fetch_defaults:
  date_window_days: 21
  per_community_limit: 20
  comment_limit: 8

ignored_communities:
  - discuss_python
  - meta_discourse
  - webapps_productivity
  - enterpriseit

reddit:
  enabled: false
  manual_import_defaults:
    suggested_communities:
      - parenting
      - mealplanning
      - frugal
      - homeowners
      - pets
      - travelhacks
    max_comments_per_thread: 6

hacker_news:
  enabled: false
  feeds:
    - ask
  per_feed_limit: 15
  comment_limit: 10

discourse:
  enabled: false
  forums: []

stack_exchange:
  enabled: true
  page_size: 10
  answer_limit: 3
  date_window_days: 21
  queries:
    - site: parenting
      community: parenting_family_logistics
      sort: votes
      order: desc
    - site: money
      community: household_budgeting
      sort: votes
      order: desc
    - site: diy
      community: home_organization
      sort: votes
      order: desc
    - site: travel
      community: travel_coordination
      sort: votes
      order: desc
    - site: pets
      community: pet_care
      sort: votes
      order: desc

rss_feeds:
  enabled: false
  feeds:
    - name: ask_metafilter
      source_label: general_life_qna
      feed_url: https://ask.metafilter.com/rss
      limit: 20
    - name: mrmoneymustache_forum
      source_label: personal_finance_community
      feed_url: https://forum.mrmoneymustache.com/index.php?type=rss;action=.xml
      limit: 20

html_generic:
  enabled: true
  request_headers:
    User-Agent: OpportunityFinderLocal/1.0
  sources:
    - name: mse_budgeting_bank_accounts
      community: personal_finance
      source_label: mse_forum
      list_url: https://forums.moneysavingexpert.com/categories/budgeting-bank-accounts
      item_selector:
        - ul.DataList li.Item
        - li.Item
      title_selector:
        - a.Title
        - h3.Title a
        - div.Title a
      link_selector:
        - a.Title
        - h3.Title a
        - div.Title a
      summary_selector:
        - div.Message
        - div.Excerpt
        - div.Item-BodyWrap
      author_selector:
        - a.Username
        - span.Author a
        - span.MItem.Author a
      limit: 18
      content_type: thread
    - name: mse_consumer_rights
